<td-layout #layout title="Sidenav Title" logo="path/to/sidenav-logo.svg">
  <mat-nav-list menu-items>
    <a
      *ngFor="let item of routes"
      md-list-item
      [routerLink]="[item.route]"
      (click)="layout.close()"
    >
      <mat-icon md-list-icon>{{ item.icon }}</mat-icon>
      {{ item.title }}
    </a>
  </mat-nav-list>
  <td-layout-nav title="Toolbar Title" logo="path/to/toolbar-logo.svg">
    <router-outlet></router-outlet>
  </td-layout-nav>
</td-layout>
